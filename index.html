<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predračuni</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #ffffff; --bg2: #f7f7f5; --bg3: #f0efe9;
  --border: rgba(0,0,0,0.11); --border2: rgba(0,0,0,0.22);
  --text: #1a1a18; --text2: #5f5e5a; --text3: #9a9990;
  --accent: #1a1a18; --success: #2d7a3a; --success-bg: #eaf3de;
  --danger: #c0392b; --danger-bg: #fcebeb;
  --blue: #185fa5; --blue-bg: #e6f1fb;
  --radius: 10px; --radius-sm: 6px;
  --sidebar: 260px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg3);
  color: var(--text);
  font-size: 15px;
  line-height: 1.5;
  min-height: 100vh;
}

/* layout */
.layout { display:flex; min-height:100vh; }

/* sidebar */
.sidebar {
  width: var(--sidebar);
  background: var(--bg);
  border-right: 0.5px solid var(--border);
  position: fixed; top:0; left:0; bottom:0;
  display:flex; flex-direction:column;
}

.sidebar-head { padding:16px; border-bottom:0.5px solid var(--border); }
.sidebar-list { flex:1; overflow:auto; padding:8px; }

/* main */
.content { margin-left: var(--sidebar); flex:1; }

/* topbar */
.topbar {
  background: var(--bg);
  border-bottom:0.5px solid var(--border);
  padding:12px 24px;
  display:flex;
  justify-content:space-between;
  position:sticky; top:0;
}

.form-area { max-width:820px; margin:0 auto; padding:22px 20px; }

.card {
  background: var(--bg);
  border:0.5px solid var(--border);
  border-radius:var(--radius);
  padding:18px;
  margin-bottom:14px;
}

.card-title {
  font-size:11px;
  font-weight:600;
  color:var(--text3);
  text-transform:uppercase;
  margin-bottom:12px;
}

/* 🔥 smanjene generalije */
.grid-2 .card {
  padding: 12px 14px;
  font-size: 13px;
}
.grid-2 label { font-size:11px; }
.grid-2 input { padding:6px 8px; font-size:13px; }

.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:14px; }

/* inputs */
input, textarea, select {
  width:100%;
  padding:8px 10px;
  border:0.5px solid var(--border2);
  border-radius:6px;
  background:var(--bg2);
}

/* items */
table { width:100%; border-collapse:collapse; }
th, td { padding:6px; border-bottom:0.5px solid var(--border); }

/* totals */
.tr { display:flex; justify-content:space-between; padding:4px 0; }
.tr.grand { font-weight:700; font-size:18px; }

/* buttons */
.btn {
  padding:8px 14px;
  border:0.5px solid var(--border2);
  background:transparent;
  cursor:pointer;
  border-radius:6px;
}

.btn-primary { background:var(--accent); color:white; }
.btn-success { background:var(--success-bg); }

/* print logo only */
.print-head {
  display:none;
  justify-content:space-between;
  margin-bottom:15px;
}
#print-logo { max-height:60px; display:block; }

@media print {
  .sidebar, .topbar, .actions { display:none!important; }
  .content { margin-left:0; }
}
</style>
</head>

<body>
<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-head">
    <button class="btn btn-primary" onclick="newPredracun()">+ Novi</button>
  </div>
  <div class="sidebar-list" id="sidebar-list"></div>
</aside>

<!-- CONTENT -->
<div class="content">

<div class="topbar">
  <div><b>Predračun</b></div>

  <!-- LOGO SAMO OVDE -->
  <img id="print-logo" />
</div>

<div class="form-area">

<!-- HEADER PRINT -->
<div class="print-head">
  <img id="print-logo">
  <h2>PREDRAČUN</h2>
</div>

<!-- IZDAVALAC / KUPAC -->
<div class="grid-2">

<div class="card">
<div class="card-title">Izdavalac</div>
<input id="from-name" placeholder="Firma">
<input id="from-pib" placeholder="PIB">
<input id="from-addr" placeholder="Adresa">
</div>

<div class="card">
<div class="card-title">Kupac</div>
<input id="to-name" placeholder="Kupac">
<input id="to-pib" placeholder="PIB">
<input id="to-addr" placeholder="Adresa">
</div>

</div>

<!-- STAVKE -->
<div class="card">
<div class="card-title">Stavke</div>

<table>
<tbody id="tbody"></tbody>
</table>

<button class="btn" onclick="addItem()">+ Stavka</button>

<div class="tr grand">
<span>UKUPNO</span>
<span id="total">0</span>
</div>
</div>

<!-- 🟢 NAPOMENA PREBAČENA NA DNO -->
<div class="card">
<div class="card-title">Napomena</div>
<textarea id="note"></textarea>
</div>

</div>
</div>
</div>

<script>
function addItem(){
const tr=document.createElement("tr");
tr.innerHTML=`
<td><input placeholder="Opis"></td>
<td><input type="number" value="1" onchange="calc()"></td>
<td><input type="number" value="0" onchange="calc()"></td>
`;
document.getElementById("tbody").appendChild(tr);
}

function calc(){
let sum=0;
document.querySelectorAll("#tbody tr").forEach(r=>{
const qty=r.children[1].children[0].value||0;
const price=r.children[2].children[0].value||0;
sum+=qty*price;
});
document.getElementById("total").textContent=sum.toFixed(2)+" RSD";
}

addItem(); addItem();
</script>

</body>
</html>
